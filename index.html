<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KFS CS Club — Certificate Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-light:#5bc8f5; --blue-mid:#4a90e2; --blue-deep:#3a5bd9;
      --bg:#07091a; --surface:#0d1230; --surface2:#111840;
      --text:#e8f0fe; --muted:#7a8fc0; --green:#00e5a0; --red:#ff4d6a;
      --gold:#f5c842;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(74,144,226,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(74,144,226,.06) 1px,transparent 1px);background-size:40px 40px;animation:gridDrift 20s linear infinite;pointer-events:none;z-index:0}
    @keyframes gridDrift{0%{background-position:0 0}100%{background-position:40px 40px}}
    .orb{position:fixed;border-radius:50%;filter:blur(120px);opacity:.18;pointer-events:none;z-index:0}
    .orb1{width:500px;height:500px;background:var(--blue-deep);top:-100px;left:-100px}
    .orb2{width:400px;height:400px;background:var(--blue-light);bottom:-80px;right:-80px;animation:pulse 6s ease-in-out infinite alternate}
    @keyframes pulse{from{opacity:.12}to{opacity:.25}}
    .wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 24px 80px}
    header{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:52px;text-align:center}
    header img{width:100px;height:100px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(91,200,245,.5));animation:float 4s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    header h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:900;letter-spacing:.04em;background:linear-gradient(135deg,var(--blue-light),var(--blue-deep));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    header p{color:var(--muted);font-size:.9rem;font-family:'Share Tech Mono',monospace}
    .scan-hint{background:linear-gradient(135deg,rgba(74,144,226,.1),rgba(91,200,245,.08));border:1px solid rgba(91,200,245,.2);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:32px;font-size:.85rem;color:var(--muted)}
    .scan-hint .icon{font-size:1.4rem;flex-shrink:0}
    .search-label{font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--blue-light);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:block}
    .search-row{display:flex;gap:10px}
    .search-row input{flex:1;background:var(--surface);border:1.5px solid rgba(74,144,226,.3);border-radius:10px;padding:14px 18px;font-size:1rem;font-family:'Share Tech Mono',monospace;color:var(--text);outline:none;transition:border-color .25s,box-shadow .25s}
    .search-row input::placeholder{color:var(--muted)}
    .search-row input:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(74,144,226,.15)}
    .btn{padding:14px 26px;background:linear-gradient(135deg,var(--blue-mid),var(--blue-deep));border:none;border-radius:10px;color:#fff;font-family:'Exo 2',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:transform .15s,box-shadow .15s;white-space:nowrap}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(58,91,217,.4)}
    #result{margin-top:28px}
    .card{background:var(--surface);border:1.5px solid rgba(74,144,226,.2);border-radius:16px;padding:32px;animation:fadeUp .35s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card.valid{border-color:rgba(0,229,160,.4)}
    .card.valid-org{border-color:rgba(245,200,66,.4)}
    .card.invalid{border-color:rgba(255,77,106,.35)}
    .status-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;font-family:'Share Tech Mono',monospace;font-size:.8rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
    .valid .status-badge{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.3)}
    .valid-org .status-badge{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.35)}
    .invalid .status-badge{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.3)}
    .status-dot{width:8px;height:8px;border-radius:50%;animation:blink 1.2s ease-in-out infinite}
    .valid .status-dot{background:var(--green)}
    .valid-org .status-dot{background:var(--gold)}
    .invalid .status-dot{background:var(--red);animation:none}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .cert-name{font-size:clamp(1.4rem,3vw,2rem);font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--blue-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .cert-course{font-size:1rem;color:var(--blue-light);font-style:italic;margin-bottom:20px}
    .cert-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
    @media(max-width:480px){.cert-meta{grid-template-columns:1fr}}
    .meta-item label{display:block;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
    .meta-item span{font-size:.95rem;color:var(--text);font-weight:600}
    .divider{height:1px;background:rgba(74,144,226,.18);margin:20px 0}
    .cert-id-row{display:flex;align-items:center;gap:10px;font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--muted)}
    .cert-id-row span{color:var(--blue-light)}
    .empty-msg{text-align:center;padding:40px 20px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:.9rem}
    .empty-msg .icon{font-size:2.5rem;display:block;margin-bottom:10px;opacity:.5}
    .role-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.72rem;font-family:'Share Tech Mono',monospace;font-weight:700;letter-spacing:.08em;margin-left:10px;vertical-align:middle}
    .role-tag.organizer{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3)}
    .role-tag.participant{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
    footer{position:relative;z-index:1;text-align:center;padding:28px 24px;font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--muted);border-top:1px solid rgba(74,144,226,.1)}
  </style>
</head>

      <h1>&lt;KFS&gt; CS Club</h1>
      <p>// Certificate Verification Portal</p>
    </header>

    <div class="scan-hint">
      <span class="icon">🔍</span>
      <span>Enter the <strong style="color:var(--blue-light)">Certificate ID</strong> from your certificate, or scan the QR code — it will auto-verify.</span>
    </div>

    <div style="margin-bottom:40px">
      <span class="search-label">// verify_certificate --id</span>
      <div class="search-row">
        <input type="text" id="certInput" placeholder="e.g. KFS-EMB-42 or KFS-EMB-ORG-03" spellcheck="false" autocomplete="off"/>
        <button class="btn" onclick="verifyCert()">VERIFY</button>
      </div>
    </div>

    <div id="result"></div>
  </div>

  <footer>&copy; 2026 KFS CS Club &nbsp;|&nbsp; Introduction to Embedded Systems</footer>

  <script>
    // ══════════════════════════════════════════════════════
    //  CERTIFICATE DATABASE — managed via admin.html
    //  Paste the exported JSON here after using the admin panel
    // ══════════════════════════════════════════════════════
    const DB_KEY = 'kfs_cert_db';

    function getDB() {
      try {
        const stored = localStorage.getItem(DB_KEY);
        if (stored) return JSON.parse(stored);
      } catch(e) {}
      // Default seed data — replace with your real students
      return {
        participants: [
          { id: "KFS-EMB-01", name: "Ahmed Hassan",  issueDate: "2025-05-28" },
          { id: "KFS-EMB-02", name: "Sara Mohamed",  issueDate: "2025-05-28" },
        ],
        organizers: [
          { id: "KFS-EMB-ORG-01", name: "Dr. Khaled Farouk", role: "Club President", issueDate: "2025-05-28" },
        ]
      };
    }

    const COURSE = "Introduction to Embedded Systems";
    const ISSUER = "KFS CS Club";

    function buildMap() {
      const db = getDB();
      const map = {};
      (db.participants || []).forEach(c => { map[c.id.toUpperCase()] = { ...c, type: 'participant' }; });
      (db.organizers  || []).forEach(c => { map[c.id.toUpperCase()] = { ...c, type: 'organizer'  }; });
      return map;
    }

    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || params.get('ID');
      if (id) {
        document.getElementById('certInput').value = id;
        verifyCert();
      }
    });

    function verifyCert() {
      const raw = document.getElementById('certInput').value.trim();
      const key = raw.toUpperCase();
      const el  = document.getElementById('result');
      if (!raw) { el.innerHTML = `<div class="empty-msg"><span class="icon">🪪</span>Please enter a certificate ID.</div>`; return; }

      const cert = buildMap()[key];

      if (cert && cert.type === 'participant') {
        el.innerHTML = `
          <div class="card valid">
            <div class="status-badge"><span class="status-dot"></span> Certificate Valid</div>
            <div class="cert-name">${esc(cert.name)}<span class="role-tag participant">Participant</span></div>
            <div class="cert-course">${COURSE}</div>
            <div class="cert-meta">
              <div class="meta-item"><label>Issued by</label><span>${ISSUER}</span></div>
              <div class="meta-item"><label>Issue Date</label><span>${fmtDate(cert.issueDate)}</span></div>
            </div>
            <div class="divider"></div>
            <div class="cert-id-row">🔑 Certificate ID: <span>${esc(cert.id)}</span></div>
          </div>`;
      } else if (cert && cert.type === 'organizer') {
        el.innerHTML = `
          <div class="card valid-org">
            <div class="status-badge"><span class="status-dot"></span> Organizer Certificate Valid</div>
            <div class="cert-name">${esc(cert.name)}<span class="role-tag organizer">Organizer</span></div>
            <div class="cert-course">${COURSE}</div>
            <div class="cert-meta">
              <div class="meta-item"><label>Issued by</label><span>${ISSUER}</span></div>
              <div class="meta-item"><label>Issue Date</label><span>${fmtDate(cert.issueDate)}</span></div>
              ${cert.role ? `<div class="meta-item"><label>Role</label><span>${esc(cert.role)}</span></div>` : ''}
            </div>
            <div class="divider"></div>
            <div class="cert-id-row">🔑 Certificate ID: <span>${esc(cert.id)}</span></div>
          </div>`;
      } else {
        el.innerHTML = `
          <div class="card invalid">
            <div class="status-badge">✕ Not Found</div>
            <p style="color:var(--muted);font-size:.95rem;line-height:1.6">
              No certificate matches <strong style="color:var(--red);font-family:'Share Tech Mono',monospace">${esc(raw)}</strong>.<br>
              Check the ID or contact the club organizer.
            </p>
          </div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('certInput').addEventListener('keydown', e => { if(e.key==='Enter') verifyCert(); });
    });
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtDate(d){ return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}); }
  </script>
